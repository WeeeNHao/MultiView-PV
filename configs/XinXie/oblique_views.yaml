_base_:
  - "./base.yaml"

pipeline:
  run_inference: true
  run_projection: true
  run_postprocess: true


data:
  data_root: "/data/dataset/PV/003-XinXie/"
  image_glob: "images/*.JPG"

postprocess:
  per_image_nms:
    enabled: false
    backend: auto
    score_field: con_weight
    iou_threshold: 0.2
    use_geometry_iou: false

  view_selection: 
    enabled: false
    view_num: 5
    distance_threshold: 0.5
    random_seed: 42

  multiview:
    enabled: false
    strategy: nms_keep_max
    score_field: con_weight
    iou_threshold: 0.2

  prompt_export:
    enabled: true
    mode: oblique
    output_dir: /data/dataset/PV/ZS_PV/003-XinXie/iter_1/views/view_5/prompts_mv_voting_ray_dsm/
    min_size: 50
    include_intersections: true
    use_spatial_index: true

  dom_merge:
    enabled: false

output:
  per_image_shp_dir: /data/dataset/PV/ZS_PV/003-XinXie/iter_4/views/view_5/proj_mv_voting_ray_dsm/
  per_image_raw_shp_dir: /data/dataset/PV/ZS_PV/003-XinXie/iter_4/views/view_5/infer_mv_voting_ray_dsm/
  final_merged_shp: /data/dataset/PV/ZS_PV/003-XinXie/iter_4/views/view_5/view_5_mv_voting_ray_dsm.shp
  trace_exports:
    enabled: false
    collected_shp: /data/dataset/PV/ZS_PV/003-XinXie/iter_4/views/view_5/view_5_collected_ray_dsm.shp
    selected_shp: /data/dataset/PV/ZS_PV/003-XinXie/iter_4/views/view_5/view_5_selected_mv_voting_ray_dsm.shp
  