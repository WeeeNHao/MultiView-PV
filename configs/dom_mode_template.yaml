_base_:
  - ./base_refactor.yaml

projection:
  mode: dom

data:
  image_path:
    - /path/to/dom/DOM.tif

# DOM-only run: single image, no multi-view selection needed.
# NMS still runs to suppress overlapping detections from sliding window.
postprocess:
  view_selection:
    enabled: false
  multiview:
    enabled: true
    strategy: nms_keep_max
    score_field: con_weight
    iou_threshold: 0.2
  dom_merge:
    enabled: false

output:
  per_image_shp_dir: outputs/refactor_v2/dom/per_image
  final_merged_shp: outputs/refactor_v2/dom/final/dom_merged.shp
